name: Build ERP Desktop App

on:
  push:
    branches:
      - main
    paths:
      - "electron/**"
      - "src/**"
      - "package.json"
      - "vite.config.*"

permissions:
  contents: write   # Required so electron-builder can publish to GitHub Releases

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --include=optional

      - name: Build React
        run: npm run build

      - name: Build & Publish Electron App
        run: npm run dist:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
